<svg width="1400" height="780" viewBox="0 0 1400 780" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GenBI open context layer architecture</title>
  <desc id="desc">A slide-style architecture diagram showing a user question flowing through an agent, Wren context, LanceDB memory, and Postgres data.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#1f5eff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#111827" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1400" height="780" fill="#f7f8fb"/>
  <rect x="52" y="50" width="1296" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>

  <text x="92" y="112" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">GenBI agent with an open context layer</text>
  <text x="92" y="148" fill="#5b6472" font-family="Arial, Helvetica, sans-serif" font-size="18">Question to governed SQL, grounded by semantic context and memory</text>

  <line x1="92" y1="184" x2="1308" y2="184" stroke="#d9dee8" stroke-width="2"/>

  <g transform="translate(106 260)">
    <circle cx="58" cy="58" r="58" fill="#eef4ff" stroke="#1f5eff" stroke-width="3"/>
    <circle cx="58" cy="46" r="18" fill="#1f5eff" opacity="0.9"/>
    <path d="M26 92C32 70 45 62 58 62C71 62 84 70 90 92" stroke="#1f5eff" stroke-width="7" stroke-linecap="round"/>
    <text x="58" y="156" text-anchor="middle" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Question</text>
  </g>

  <g transform="translate(330 238)">
    <rect x="0" y="0" width="198" height="156" rx="10" fill="#f9fafc" stroke="#cfd6e3" stroke-width="2"/>
    <rect x="24" y="28" width="150" height="18" rx="3" fill="#1f5eff"/>
    <rect x="24" y="62" width="112" height="12" rx="3" fill="#9aa8bd"/>
    <rect x="24" y="88" width="132" height="12" rx="3" fill="#9aa8bd"/>
    <rect x="24" y="114" width="82" height="12" rx="3" fill="#9aa8bd"/>
    <text x="99" y="202" text-anchor="middle" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Agent</text>
  </g>

  <g transform="translate(632 208)">
    <rect x="0" y="0" width="250" height="216" rx="14" fill="#eef4ff" stroke="#1f5eff" stroke-width="3"/>
    <path d="M58 68H192M58 108H192M58 148H192" stroke="#1f5eff" stroke-width="8" stroke-linecap="round"/>
    <circle cx="58" cy="68" r="12" fill="#ffffff" stroke="#1f5eff" stroke-width="4"/>
    <circle cx="58" cy="108" r="12" fill="#ffffff" stroke="#1f5eff" stroke-width="4"/>
    <circle cx="58" cy="148" r="12" fill="#ffffff" stroke="#1f5eff" stroke-width="4"/>
    <text x="125" y="262" text-anchor="middle" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Wren context</text>
  </g>

  <g transform="translate(986 236)">
    <ellipse cx="100" cy="38" rx="96" ry="34" fill="#f9fafc" stroke="#cfd6e3" stroke-width="2"/>
    <path d="M4 38V122C4 141 47 156 100 156C153 156 196 141 196 122V38" fill="#f9fafc"/>
    <path d="M4 38V122C4 141 47 156 100 156C153 156 196 141 196 122V38" stroke="#cfd6e3" stroke-width="2"/>
    <path d="M4 80C4 99 47 114 100 114C153 114 196 99 196 80" stroke="#cfd6e3" stroke-width="2"/>
    <text x="100" y="202" text-anchor="middle" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Postgres</text>
  </g>

  <g transform="translate(632 505)">
    <rect x="0" y="0" width="250" height="116" rx="14" fill="#f4f6f9" stroke="#cfd6e3" stroke-width="2"/>
    <path d="M56 70C74 44 92 44 110 70C128 96 146 96 164 70C178 50 192 45 208 56" stroke="#5b6472" stroke-width="7" stroke-linecap="round"/>
    <circle cx="56" cy="70" r="7" fill="#1f5eff"/>
    <circle cx="110" cy="70" r="7" fill="#1f5eff"/>
    <circle cx="164" cy="70" r="7" fill="#1f5eff"/>
    <text x="125" y="164" text-anchor="middle" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">LanceDB memory</text>
  </g>

  <path d="M226 318H316" stroke="#1f5eff" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M542 318H614" stroke="#1f5eff" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M904 318H966" stroke="#1f5eff" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M757 438V486" stroke="#1f5eff" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M892 563C1020 563 1088 495 1088 421" stroke="#9aa8bd" stroke-width="3" stroke-dasharray="8 9" stroke-linecap="round"/>

  <g transform="translate(324 560)">
    <rect x="0" y="0" width="178" height="50" rx="25" fill="#111827"/>
    <text x="89" y="32" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Final SQL</text>
  </g>
  <path d="M730 626C650 682 544 682 468 618" stroke="#111827" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(92 650)">
    <rect x="0" y="0" width="1216" height="36" rx="18" fill="#eef1f6"/>
    <rect x="18" y="11" width="180" height="14" rx="7" fill="#1f5eff"/>
    <rect x="222" y="11" width="150" height="14" rx="7" fill="#8b98ad"/>
    <rect x="396" y="11" width="220" height="14" rx="7" fill="#8b98ad"/>
    <rect x="640" y="11" width="135" height="14" rx="7" fill="#8b98ad"/>
    <rect x="799" y="11" width="210" height="14" rx="7" fill="#8b98ad"/>
    <rect x="1033" y="11" width="165" height="14" rx="7" fill="#8b98ad"/>
  </g>
</svg>
